<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNCAR | المنصة الرقمية المتقدمة لقطع الغيار</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- شريط التنقل العلوي الموحد -->
    <nav class="cyber-nav">
        <div class="nav-brand">TUN<span>CAR</span></div>
        <div class="nav-links">
            <a href="index.html" class="active-nav">الرئيسية</a>
            <a href="catalog.html">المتجر الرقمي</a>
            <a href="checkout.html">السلة والضمان</a>
        </div>
        <button class="btn-cyber" style="width:auto; padding:5px 15px;" onclick="toggleLanguage()">EN / ع</button>
    </nav>

    <!-- الهيرو والبحث الذكي -->
    <header class="hero-section">
        <div class="hero-container">
            <h1 id="lbl-hero-title">الجيل القادم من تتبع وفحص قطع الغيار في تونس</h1>
            <p id="lbl-hero-desc">منظومة ذكية مدعومة بالتوثيق الرقمي وتتبع التغليف لضمان حقك وحق محركك.</p>
            
            <div class="search-wrapper">
                <div class="search-box">
                    <input type="text" id="vinSearchInput" placeholder="أدخل رقم الهيكل (VIN) للسيارة أو اسم القطعة (مثال: Golf 6)...">
                    <button class="btn-cyber" style="width: auto; padding: 0 30px;" onclick="handleMainSearch()">🔍 بحث ذكي</button>
                </div>
            </div>
        </div>
    </header>

    <!-- أقسام القطع الرئيسية -->
    <main class="container">
        <h2 class="section-title" id="lbl-cats-title">📂 تصفح الفئات الرئيسية</h2>
        <div class="categories-grid">
            <div class="cat-card" onclick="window.location.href='catalog.html?cat=engine'">
                <div class="cat-icon">🔧</div>
                <h3>أجزاء المحرك والـ Culasse</h3>
            </div>
            <div class="cat-card" onclick="window.location.href='catalog.html?cat=suspension'">
                <div class="cat-icon">🛑</div>
                <h3>نظام التعليق والممتصات</h3>
            </div>
            <div class="cat-card" onclick="window.location.href='catalog.html?cat=electronics'">
                <div class="cat-icon">⚡</div>
                <h3>الإلكترونيات وحساسات OBD2</h3>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
